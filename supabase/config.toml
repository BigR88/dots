# Minimale Supabase-CLI-Konfiguration. `supabase start` braucht Docker.
project_id = "dots"

[db]
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8081"
